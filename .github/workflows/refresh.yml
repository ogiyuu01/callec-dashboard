name: Refresh dashboard data

on:
  schedule:
    # 毎日 09:00 JST (= 00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dashboard repo
        uses: actions/checkout@v4

      - name: Checkout sibling shopify-ec-automation repo (optional - release_log.csv / weekly_kpi.csv)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/shopify-ec-automation
          token: ${{ secrets.SIBLING_REPO_TOKEN }}
          path: ../shopify-ec-automation
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install google-cloud-bigquery gspread google-auth

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Sync budget from Google Sheets
        run: python3 scripts/sync_budget.py
        continue-on-error: true

      - name: Refresh data
        run: python3 scripts/refresh_data.py

      - name: Refresh Klaviyo flow data
        env:
          KLAVIYO_PRIVATE_API_KEY: ${{ secrets.KLAVIYO_PRIVATE_API_KEY }}
        run: python3 scripts/refresh_klaviyo.py
        continue-on-error: true

      - name: Refresh Shopify Admin metrics + inventory (Client Credentials Grant)
        env:
          SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP_DOMAIN }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
        run: python3 scripts/refresh_shopify.py
        continue-on-error: true

      - name: Refresh LINE link rate (line-harness Worker)
        env:
          LINE_HARNESS_API_KEY: ${{ secrets.LINE_HARNESS_API_KEY }}
          LINE_HARNESS_WORKER_URL: ${{ secrets.LINE_HARNESS_WORKER_URL }}
        run: python3 scripts/refresh_line_link.py
        continue-on-error: true

      - name: Build PM dashboard data (pm.json — 4ソース統合 scorecard/alerts/signals/activity)
        run: python3 scripts/build_pm_data.py
        continue-on-error: true

      - name: Commit & push dashboard data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add d-*/data/*.json
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "chore(data): refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
